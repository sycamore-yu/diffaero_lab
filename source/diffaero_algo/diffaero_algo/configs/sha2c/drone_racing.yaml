defaults:
  - /env/drone_racing

algorithm:
  name: sha2c
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  max_grad_norm: 1.0
  rollout_horizon: 32
  actor_hidden_dims: [256, 128, 64]
  critic_hidden_dims: [512, 256, 128]
  init_log_std: 0.0
  target_entropy: -4.0
  soft_update_coef: 0.005
  gamma: 0.99
